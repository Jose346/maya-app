name: Criar APK Maya
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Iniciar Dependencias do Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git zlib1g-dev python3 python3-dev python3-pip unzip autoconf libtool libltdl-dev libffi-dev libssl-dev openjdk-17-jdk cmake libncurses5-dev libncursesw5-dev libtinfo5

    - name: Configurar Python e Pip
      run: |
        pip3 install --upgrade pip
        pip3 install "cython<3.0.0" buildozer
        pip3 install --force-reinstall cython==0.29.36

    - name: Rodar Compilador Buildozer
      run: yes | buildozer -v android debug

    - name: Enviar APK Pronto para o Painel
      uses: actions/upload-artifact@v4
      with:
        name: aplicativo-final-apk
        path: bin/*.apk
