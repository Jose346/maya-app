name: Criar APK Maya
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python 3.11 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Iniciar Dependencias do Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git zlib1g-dev python3 python3-dev python3-pip unzip autoconf libtool libltdl-dev libffi-dev libssl-dev openjdk-17-jdk cmake libncurses5-dev libncursesw5-dev libtinfo5 aidl

    - name: Configurar Buildozer e Cython Legado
      run: |
        pip3 install --upgrade pip
        pip3 install "cython<3.0.0" buildozer
        pip3 install --force-reinstall cython==0.29.36

    - name: Aceitar Licencas do Android SDK
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg

    - name: Rodar Compilador Buildozer
      run: |
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        buildozer -v android debug
